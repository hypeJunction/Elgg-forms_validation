version: "3.8"

services:
  elgg:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ELGG_PORT:-9797}:80"
    environment:
      ELGG_DB_HOST: db
      ELGG_DB_USER: elgg
      ELGG_DB_PASS: elgg
      ELGG_DB_NAME: elgg
      ELGG_DB_PORT: "3306"
      ELGG_PORT: "80"
      ELGG_SITE_URL: "http://localhost:${ELGG_PORT:-9797}/"
      ELGG_SITE_NAME: "Elgg Test"
      ELGG_ADMIN_USER: "admin"
      ELGG_ADMIN_PASS: "adminadminadmin12"
      ELGG_ADMIN_EMAIL: "admin@example.com"
    volumes:
      - ../..:/var/www/html/mod/forms_validation
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: elgg
      MYSQL_USER: elgg
      MYSQL_PASSWORD: elgg
    ports:
      - "${DB_PORT:-5797}:3306"
    command: --innodb-use-native-aio=0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "elgg", "-pelgg"]
      interval: 5s
      timeout: 5s
      retries: 10
